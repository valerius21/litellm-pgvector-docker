# Full LiteLLM + pgvector stack
# Usage: docker compose -f docker-compose.full.yml up -d
#
# Services:
#   pgvector         - PostgreSQL with pgvector extension (databases: vectors, litellm)
#   litellm          - LiteLLM proxy (connects to litellm DB)
#   litellm-pgvector - Vector store API (connects to vectors DB, uses litellm proxy for embeddings)

services:
  pgvector:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    shm_size: 1g
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vectors}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${PGVECTOR_PORT:-5432}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./init-db/full:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-vectors}"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@pgvector:5432/litellm"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?Set LITELLM_MASTER_KEY in .env}
      STORE_MODEL_IN_DB: "True"
    env_file:
      - .env
    volumes:
      - ./config/litellm-config.yaml:/app/config.yaml:ro
    depends_on:
      pgvector:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import urllib.request; urllib.request.urlopen(''http://localhost:4000/health/liveliness'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  litellm-pgvector:
    build:
      context: .
      args:
        LITELLM_PGVECTOR_REF: ${LITELLM_PGVECTOR_REF:-main}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@pgvector:5432/${POSTGRES_DB:-vectors}"
      SERVER_API_KEY: ${SERVER_API_KEY:?Set SERVER_API_KEY in .env}
      HOST: "0.0.0.0"
      PORT: "8000"
      EMBEDDING__MODEL: ${EMBEDDING__MODEL:-text-embedding-ada-002}
      EMBEDDING__BASE_URL: "http://litellm:4000"
      EMBEDDING__API_KEY: ${LITELLM_MASTER_KEY}
      EMBEDDING__DIMENSIONS: "${EMBEDDING__DIMENSIONS:-1536}"
    depends_on:
      pgvector:
        condition: service_healthy
      litellm:
        condition: service_healthy

volumes:
  pgvector_data: